<!-- [START] CSS Tooltip -->
<style>
	/* Tooltip */
	.tooltip-wrapper {
		@apply relative flex max-w-fit flex-col items-center;
	}
	.tooltip-icon {
		@apply h-5 w-5 text-gray-500;
	}
	.tooltip {
		@apply pointer-events-none absolute bottom-full left-1/2 z-50 mb-2 w-max max-w-xs -translate-x-1/2 scale-95 opacity-0 transition-all duration-150 ease-out group-focus-within:scale-100 group-focus-within:opacity-100 group-hover:scale-100 group-hover:opacity-100;
	}
	.tooltip-content {
		@apply text-primary relative z-0 block rounded bg-gray-100 px-3 py-2 text-xs;
	}
	.tooltip-arrow {
		@apply relative -z-10 mx-auto block h-2 w-2 -translate-y-1 rotate-45 bg-gray-100;
	}
</style>
<!-- [END] CSS Tooltip -->
