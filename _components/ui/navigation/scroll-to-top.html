<!-- ============================== Default ============================== -->
<!-- [START] HTML Scroll to top -->
<button
	class="scroll-to-top-btn"
	id="scroll-to-top-btn"
	aria-label="Scroll to top"
	data-scroll-top
>
	<svg
		width="18"
		height="18"
		viewBox="0 0 24 24"
		fill="none"
		stroke="currentColor"
		stroke-width="2"
	>
		<path d="M12 19V5M5 12l7-7 7 7" />
	</svg>
</button>
<!-- [END] HTML  Scroll to top -->

<!-- [START] CSS  Scroll to top -->
<style>
	/* Scroll to Top Button */
	.scroll-to-top-btn {
		@apply pointer-events-none fixed right-6 bottom-6 z-50 flex h-10 w-10 translate-y-2 cursor-pointer items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 opacity-0 transition-all duration-300;
	}
	.scroll-to-top-btn.visible {
		@apply pointer-events-auto translate-y-0 opacity-100;
	}
	.scroll-to-top-btn:hover {
		@apply bg-gray-50 text-gray-800;
	}
</style>
<!-- [END] CSS  Scroll to top -->

<!-- [START] JavaScript  Scroll to top -->
<script>
	function initializeScrollToTop() {
		const SHOW_AFTER_PX = 300

		// Всі кнопки зі скролом вгору
		document.querySelectorAll("[data-scroll-top]").forEach((btn) => {
			btn.addEventListener("click", () => {
				window.scrollTo({ top: 0, behavior: "smooth" })
			})
		})

		// Показати / приховати фіксовану кнопку
		const fixedBtn = document.getElementById("scroll-to-top-btn")
		if (!fixedBtn) return

		function toggleVisibility() {
			fixedBtn.classList.toggle("visible", window.scrollY > SHOW_AFTER_PX)
		}

		window.addEventListener("scroll", toggleVisibility, { passive: true })
		toggleVisibility() // перевірити стан при ініціалізації
	}

	initializeScrollToTop()
</script>
<!-- [END] JavaScript  Scroll to top -->
