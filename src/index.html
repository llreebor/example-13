<!doctype html>
<html lang="en" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>kintone</title>

		<!-- CSS -->
		<link rel="stylesheet" href="./css/output.css" />

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>

		<!-- Swiper Slider -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
		/>
	</head>
	<body>
		<div class="wrapper flex min-h-full flex-col">
			<!-- Header -->
			<header class="border-b-primary border-b py-4 md:py-4.5 lg:py-5">
				<div class="container">
					<div class="flex items-center justify-between">
						<!-- Logo -->
						<a href="#"><img src="./images/global/logo.svg" alt="logo" /></a>

						<!-- Desktop menu -->
						<div class="hidden items-center gap-1.5 md:flex">
							<a href="#" class="btn btn-sm btn-primary-outline">Book Demo</a>
							<a href="#" class="btn btn-sm btn-secondary">Free Trial</a>
						</div>

						<!-- Mobile Menu -->
						<div class="md:hidden">
							<div
								id="mobile-menu"
								aria-hidden="true"
								class="fixed top-0 left-0 z-10 h-full w-[80%] -translate-x-full transform bg-white shadow-xl transition-transform duration-300 ease-in-out [.is-open]:translate-x-0"
							>
								<p class="hidden">MOBILE MENU</p>
							</div>

							<!-- Overlay -->
							<div
								id="mobile-menu-overlay"
								aria-hidden="true"
								role="presentation"
								class="pointer-events-none fixed inset-0 z-0 bg-black/80 opacity-0 transition-opacity duration-300 ease-in-out"
							></div>
						</div>

						<!-- Burger Button -->
						<button
							id="burger"
							class="group burger-btn"
							aria-label="Toggle mobile menu"
							aria-expanded="false"
							aria-controls="mobile-menu"
						>
							<span class="burger-btn-top-line"></span>
							<span class="burger-btn-center-line"></span>
							<span class="burger-btn-bottom-line"></span>
						</button>
					</div>
				</div>
			</header>

			<!-- Main Content -->
			<main class="flex-auto"></main>

			<!-- Footer -->
			<footer class="bg-gray-200">
				<div class="container">
					<div class="border-b-primary pt-18 lg:border-b lg:pt-20">
						<div class="flex flex-col lg:flex-row">
							<div class="mx-auto flex w-full max-w-47.5 flex-col items-center">
								<a href="#">
									<img src="./images/global/logo.svg" alt="logo" />
								</a>

								<div
									class="mt-6 flex w-full items-center gap-2.5 border-b border-b-black py-2 md:mt-7 lg:mt-8"
								>
									<img src="./images/icons/lang.svg" alt="lang" />

									<select
										name="#"
										id="#"
										class="w-full cursor-pointer text-sm outline-none lg:text-base"
									>
										<optgroup label="America">
											<option value="us">U.S.</option>
										</optgroup>
										<optgroup label="Asia Pacific">
											<option value="cambodia">Cambodia</option>
											<option value="india">India</option>
											<option value="korea">Korea</option>
										</optgroup>
										<optgroup label="Oceania">
											<option value="australia">Australia</option>
											<option value="singapore">Singapore</option>
											<option value="singapore">Singapore</option>
											<option value="japan">Japan</option>
										</optgroup>
										<optgroup label="Oceania">
											<option value="australia">Australia</option>
											<option value="new_zeland">New Zeland</option>
										</optgroup>
									</select>
								</div>

								<ul class="mt-10 mb-5 flex items-center gap-4.5">
									<li>
										<a href="#" target="_blank" class="group">
											<img
												class="transition-transform group-hover:scale-110"
												src="./images/icons/fb.svg"
												alt="facebook"
											/>
										</a>
									</li>
									<li>
										<a href="#" target="_blank" class="group">
											<img
												class="transition-transform group-hover:scale-110"
												src="./images/icons/x.svg"
												alt="x"
											/>
										</a>
									</li>
									<li>
										<a href="#" target="_blank" class="group">
											<img
												class="transition-transform group-hover:scale-110"
												src="./images/icons/linkedin.svg"
												alt="linkedin"
											/>
										</a>
									</li>
									<li>
										<a href="#" target="_blank" class="group">
											<img
												class="transition-transform group-hover:scale-110"
												src="./images/icons/inst.svg"
												alt="instagram"
											/>
										</a>
									</li>
								</ul>
							</div>
							<div class="hidden">DESKTOP MENUS</div>
						</div>
					</div>

					<div class="mx-auto my-10 flex max-w-85.5 flex-col gap-10">
						<!-- Mobile Menu -->
						<nav class="lg:hidden">
							<ul class="grid grid-cols-2 space-y-5">
								<li>
									<a
										href="#"
										class="flex items-center gap-2 underline underline-offset-4"
									>
										<img src="./images/icons/link-arrow.svg" alt="link arrow" />
										<p class="text-dark text-base">Terms of Use</p>
									</a>
								</li>
								<li>
									<a
										href="#"
										class="flex items-center gap-2 underline underline-offset-4"
									>
										<img src="./images/icons/link-arrow.svg" alt="link arrow" />
										<p class="text-dark text-base">Privacy Policy</p>
									</a>
								</li>
								<li>
									<a
										href="#"
										class="flex items-center gap-2 underline underline-offset-4"
									>
										<img src="./images/icons/link-arrow.svg" alt="link arrow" />
										<p class="text-dark text-base">Security</p>
									</a>
								</li>
								<li>
									<a
										href="#"
										class="flex items-center gap-2 underline underline-offset-4"
									>
										<img src="./images/icons/link-arrow.svg" alt="link arrow" />
										<p class="text-dark text-base">Partners</p>
									</a>
								</li>
								<li>
									<a
										href="#"
										class="flex items-center gap-2 underline underline-offset-4"
									>
										<img src="./images/icons/link-arrow.svg" alt="link arrow" />
										<p class="text-dark text-base">Contact Us</p>
									</a>
								</li>
							</ul>
						</nav>

						<a href="@" class="btn btn-sm btn-secondary-outline text-sm">
							Do Not Sell or Share My Personal Information
						</a>
					</div>

					<!-- Copy -->
					<div
						class="bg-primary py-5 text-center lg:bg-white lg:pt-0 lg:pb-10 lg:text-right"
					>
						<p class="lg:text-gray text-sm text-white lg:text-base">
							© 2022 Kintone
						</p>
					</div>
				</div>
			</footer>
		</div>

		<!-- Libs -->
		<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

		<!-- Custom JavaScript -->
		<script src="./js/main.js"></script>
	</body>
</html>
